<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suno Prompt Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white rounded-xl shadow-lg p-8 max-w-2xl w-full">
        <h1 class="text-3xl font-bold text-gray-800 mb-6 text-center">Suno Prompt Generator</h1>
        
        <div class="space-y-4">
            <div>
                <label for="youtube-url" class="block text-sm font-medium text-gray-700 mb-1">YouTube URL</label>
                <div class="flex gap-2">
                    <input type="text" id="youtube-url" placeholder="https://www.youtube.com/watch?v=..." 
                           class="flex-1 rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 border p-2">
                    <button id="process-btn" onclick="processUrl()" 
                            class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 px-4 rounded-md transition-colors disabled:opacity-50 flex items-center justify-center min-w-[100px]">
                        Process
                    </button>
                </div>
            </div>

            <!-- Loading Indicator -->
            <div id="loading-indicator" class="hidden text-center py-4 text-indigo-600 font-medium animate-pulse">
                Analyzing audio, extracting chords, and transcribing lyrics... this may take a minute.
            </div>
            
            <!-- Error Message -->
            <div id="error-message" class="hidden p-3 bg-red-100 text-red-700 rounded-md text-sm">
            </div>

            <!-- Result Section -->
            <div id="result-container" class="hidden pt-4 border-t border-gray-200 mt-6">
                <div class="flex justify-between items-center mb-2">
                    <h2 class="text-lg font-semibold text-gray-800">Generated Suno Prompt</h2>
                    <button onclick="copyPrompt()" class="text-sm text-indigo-600 hover:text-indigo-800 font-medium">
                        Copy to Clipboard
                    </button>
                </div>
                <textarea id="suno-prompt" rows="12" readonly
                          class="w-full rounded-md border-gray-300 shadow-sm bg-gray-50 border p-3 font-mono text-sm resize-y focus:ring-indigo-500 focus:border-indigo-500"></textarea>
            </div>
        </div>
    </div>

    <script>
        async function processUrl() {
            const urlInput = document.getElementById('youtube-url').value;
            const processBtn = document.getElementById('process-btn');
            const loadingIndicator = document.getElementById('loading-indicator');
            const resultContainer = document.getElementById('result-container');
            const errorMessage = document.getElementById('error-message');
            const promptArea = document.getElementById('suno-prompt');

            if (!urlInput.trim()) {
                showError("Please enter a YouTube URL");
                return;
            }

            // Reset UI
            processBtn.disabled = true;
            loadingIndicator.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            errorMessage.classList.add('hidden');
            promptArea.value = '';

            try {
                // Ensure we call the correct endpoint (/generate, not /analyze)
                const response = await fetch('http://localhost:8000/generate', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        youtube_url: urlInput.trim(),
                        genre: "pop"
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'An error occurred during processing');
                }

                promptArea.value = data.suno_prompt;
                resultContainer.classList.remove('hidden');

            } catch (err) {
                showError(err.message || 'Failed to connect to the server. Is FastAPI running on port 8000?');
            } finally {
                processBtn.disabled = false;
                loadingIndicator.classList.add('hidden');
            }
        }

        function showError(msg) {
            const errorMessage = document.getElementById('error-message');
            errorMessage.textContent = msg;
            errorMessage.classList.remove('hidden');
        }

        function copyPrompt() {
            const promptArea = document.getElementById('suno-prompt');
            promptArea.select();
            promptArea.setSelectionRange(0, 99999); /* For mobile devices */
            navigator.clipboard.writeText(promptArea.value).then(() => {
                const copyBtn = document.querySelector('button[onclick="copyPrompt()"]');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = 'Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            });
        }
    </script>
</body>
</html>
